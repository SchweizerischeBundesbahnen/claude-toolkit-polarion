---
rules:
  # Secrets are protected by GitHub's fork PR approval requirement,
  # which prevents untrusted workflows from accessing secrets without explicit approval.
  secrets-outside-env:
    ignore: [claude-code-review.yml]
  # Reusable workflows from our own org — tracking @main intentionally.
  unpinned-uses:
    config:
      policies:
        '*': hash-pin
        SchweizerischeBundesbahnen/*: any
